version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: ckfinder_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ckfinder_net

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: ckfinder_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET:-media};
      mc anonymous set download local/${MINIO_BUCKET:-media}/images;
      mc anonymous set download local/${MINIO_BUCKET:-media}/videos;
      echo 'MinIO initialized successfully';
      "
    networks:
      - ckfinder_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ckfinder_backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - ckfinder_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ckfinder_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ckfinder_net
    restart: unless-stopped

volumes:
  minio_data:

networks:
  ckfinder_net:
    driver: bridge
